# Production Docker Compose (optional reference)
# Use this if deploying API + Web as separate containers with reverse proxy
# Otherwise, single-container deployment is simpler

version: '3.9'

services:
  # ========================================================================
  # REVERSE PROXY: Nginx routing
  # ========================================================================
  nginx:
    image: nginx:alpine
    container_name: tadkar-nginx
    restart: unless-stopped
    
    ports:
      - "80:80"
      - "443:443"
    
    volumes:
      # Mount nginx config
      - ./docker/nginx-web.conf:/etc/nginx/nginx.conf:ro
      # SSL certificates (if using HTTPS)
      - /etc/letsencrypt:/etc/letsencrypt:ro
    
    networks:
      - tadkar-network
    
    depends_on:
      - api
      - web

  # ========================================================================
  # API: NestJS backend (production image)
  # ========================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: tadkar-api
    restart: unless-stopped
    
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: file:/data/production.db
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:4200}
      LOG_LEVEL: info
    
    ports:
      - "3000:3000"
    
    volumes:
      # Persistent database
      - tadkar-db:/data
    
    networks:
      - tadkar-network
    
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ========================================================================
  # WEB: Angular frontend (production image)
  # ========================================================================
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: tadkar-web
    restart: unless-stopped
    
    environment:
      NODE_ENV: production
    
    ports:
      - "4200:4200"
    
    networks:
      - tadkar-network
    
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

# ============================================================================
# VOLUMES: Persistent data
# ============================================================================
volumes:
  tadkar-db:
    driver: local

# ============================================================================
# NETWORKS: Service communication
# ============================================================================
networks:
  tadkar-network:
    driver: bridge
