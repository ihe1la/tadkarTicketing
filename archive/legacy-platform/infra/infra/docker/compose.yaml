services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: tadkar
      POSTGRES_PASSWORD: tadkar
      POSTGRES_DB: tadkar
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck:
      { test: [CMD-SHELL, 'pg_isready -U tadkar'], interval: 5s, timeout: 3s, retries: 20 }
  redis:
    image: redis:8-alpine
    command: redis-server --appendonly yes
    volumes: [redis-data:/data]
    healthcheck: { test: [CMD, redis-cli, ping], interval: 5s, timeout: 3s, retries: 20 }
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address :9001
    environment: { MINIO_ROOT_USER: minio, MINIO_ROOT_PASSWORD: local-development-only }
    volumes: [minio-data:/data]
    healthcheck: { test: [CMD, mc, ready, local], interval: 5s, timeout: 3s, retries: 20 }
  api:
    build: { context: ../.., dockerfile: apps/api/Dockerfile }
    env_file: ../../.env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    ports: ['3000:3000']
  web:
    build: { context: ../.., dockerfile: apps/web/Dockerfile }
    depends_on: { api: { condition: service_started } }
    ports: ['8080:8080']
volumes: { postgres-data: {}, redis-data: {}, minio-data: {} }
